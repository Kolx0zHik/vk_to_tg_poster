name: Publish Docker image

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker tag to publish to GHCR"
        required: true
        default: "test-manual"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/kolx0zhik/vk_to_tg_poster
    steps:
      - uses: actions/checkout@v4

      - name: Read project version
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "tags<<EOF"
              echo "${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            {
              echo "tags<<EOF"
              echo "${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOF"
              echo "${{ env.IMAGE_NAME }}:latest"
              echo "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
