services:
  vk2tg:
    build: .
    image: vk_to_tg_poster:dev
    container_name: vk_to_tg_poster_dev
    restart: unless-stopped
    ports:
      - "8222:8222"
    environment:
      # Optional: container timezone for logs and scheduler
      TZ: Europe/Moscow
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./data:/app/data
