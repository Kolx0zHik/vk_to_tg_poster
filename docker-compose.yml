services:
  vk2tg:
    image: ghcr.io/kolx0zhik/vk_to_tg_poster:latest
    container_name: vk_to_tg_poster
    restart: unless-stopped
    ports:
      - "8222:8222"
    environment:
      # Optional: container timezone for logs and scheduler
      TZ: Europe/Moscow
    volumes:
      - ./data:/app/data
